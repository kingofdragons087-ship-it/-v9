name: Build Electron EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: 👑مترجم اسطوري اصدار 9👑
          path: dist/
